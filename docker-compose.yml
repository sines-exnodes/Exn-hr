version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: exn-hr-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: exnhr
      POSTGRES_PASSWORD: exnhr_secret
      POSTGRES_DB: exn_hr
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exnhr -d exn_hr"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
